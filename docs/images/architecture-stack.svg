<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 540" font-family="'Inter', 'Segoe UI', system-ui, sans-serif">

  <defs>
    <marker id="arrDown" markerWidth="8" markerHeight="8" refX="4" refY="7" orient="auto">
      <path d="M0,0 L8,0 L4,8 z" fill="#818cf8"/>
    </marker>
    <marker id="arrRight" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#818cf8"/>
    </marker>
    <marker id="arrLeft" markerWidth="8" markerHeight="8" refX="1" refY="3" orient="auto">
      <path d="M8,0 L8,6 L0,3 z" fill="#818cf8"/>
    </marker>
    <marker id="arrDownOr" markerWidth="8" markerHeight="8" refX="4" refY="7" orient="auto">
      <path d="M0,0 L8,0 L4,8 z" fill="#f0883e"/>
    </marker>
    <marker id="arrRightOr" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#f0883e"/>
    </marker>
    <marker id="arrLeftOr" markerWidth="8" markerHeight="8" refX="1" refY="3" orient="auto">
      <path d="M8,0 L8,6 L0,3 z" fill="#f0883e"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="860" height="540" fill="#0d1117" rx="10"/>
  <rect width="860" height="540" fill="none" stroke="#30363d" stroke-width="1.5" rx="10"/>

  <!-- Title -->
  <text x="430" y="36" text-anchor="middle" fill="#f0f6fc" font-size="17" font-weight="700">System Architecture</text>
  <text x="430" y="56" text-anchor="middle" fill="#7d8590" font-size="11">How agents, LLMs, and MemClaw connect</text>

  <!-- Layer 1: Orchestrator -->
  <rect x="240" y="74" width="380" height="72" rx="6" fill="#161b22" stroke="#2f6dba" stroke-width="1.5"/>
  <text x="430" y="98" text-anchor="middle" fill="#79b8ff" font-size="13" font-weight="700">run_pipeline.py</text>
  <text x="430" y="116" text-anchor="middle" fill="#8b949e" font-size="11">Orchestrator - runs all 5 agents in sequence</text>
  <text x="430" y="133" text-anchor="middle" fill="#6e7681" font-size="10">--dry-run · --skip-manager · --json-output · --log-level</text>

  <!-- Arrow: orchestrator to agent_base -->
  <line x1="430" y1="146" x2="430" y2="174" stroke="#818cf8" stroke-width="1.5" marker-end="url(#arrDown)"/>
  <text x="438" y="163" fill="#818cf8" font-size="10">run_agent()</text>

  <!-- Layer 2: agent_base -->
  <rect x="140" y="176" width="580" height="108" rx="6" fill="#161b22" stroke="#238636" stroke-width="1.5"/>
  <text x="430" y="200" text-anchor="middle" fill="#3fb950" font-size="13" font-weight="700">agent_base.py - Shared Agentic Loop</text>
  <text x="430" y="218" text-anchor="middle" fill="#8b949e" font-size="11">Shared by all 5 agents · OpenAI-compatible tool-use loop</text>
  <line x1="160" y1="226" x2="700" y2="226" stroke="#30363d" stroke-width="1"/>
  <text x="200" y="243" fill="#6e7681" font-size="10">1. Load tool schemas from mcp_client</text>
  <text x="200" y="258" fill="#6e7681" font-size="10">2. Send system + user prompt + tools to LLM</text>
  <text x="490" y="243" fill="#6e7681" font-size="10">3. Execute tool_calls -&gt; feed results back</text>
  <text x="490" y="258" fill="#6e7681" font-size="10">4. Loop until finish_reason: stop</text>
  <text x="430" y="275" text-anchor="middle" fill="#3fb950" font-size="10">Exponential backoff: 4 retries · 429 rate-limit handling</text>

  <!-- Left arm to LLM -->
  <line x1="140" y1="228" x2="104" y2="228" stroke="#818cf8" stroke-width="1.5" marker-end="url(#arrLeft)"/>
  <line x1="104" y1="228" x2="104" y2="316" stroke="#818cf8" stroke-width="1.5"/>
  <line x1="104" y1="316" x2="132" y2="316" stroke="#818cf8" stroke-width="1.5" marker-end="url(#arrRight)"/>
  <text x="44" y="268" fill="#818cf8" font-size="9" text-anchor="middle">chat</text>
  <text x="44" y="280" fill="#818cf8" font-size="9" text-anchor="middle">completions</text>
  <text x="44" y="292" fill="#818cf8" font-size="9" text-anchor="middle">API</text>

  <!-- Right arm to mcp_client -->
  <line x1="720" y1="228" x2="756" y2="228" stroke="#f0883e" stroke-width="1.5" marker-end="url(#arrRightOr)"/>
  <line x1="756" y1="228" x2="756" y2="316" stroke="#f0883e" stroke-width="1.5"/>
  <line x1="756" y1="316" x2="728" y2="316" stroke="#f0883e" stroke-width="1.5" marker-end="url(#arrLeftOr)"/>
  <text x="810" y="268" fill="#f0883e" font-size="9" text-anchor="middle">tool calls</text>
  <text x="810" y="280" fill="#f0883e" font-size="9" text-anchor="middle">dispatched</text>

  <!-- Layer 3 left: LLM Gateway -->
  <rect x="30" y="290" width="260" height="130" rx="6" fill="#1e1530" stroke="#6e40c9" stroke-width="1.5"/>
  <text x="160" y="316" text-anchor="middle" fill="#bc8cff" font-size="12" font-weight="700">LLM Gateway</text>
  <text x="160" y="333" text-anchor="middle" fill="#7d8590" font-size="10">Any OpenAI-compatible endpoint</text>
  <line x1="50" y1="340" x2="270" y2="340" stroke="#30363d" stroke-width="1"/>
  <text x="50" y="356" fill="#8b949e" font-size="10">· Any managed cloud provider</text>
  <text x="50" y="371" fill="#8b949e" font-size="10">· OpenAI, Groq, OpenRouter</text>
  <text x="50" y="386" fill="#8b949e" font-size="10">· Ollama (local, no key needed)</text>
  <text x="160" y="410" text-anchor="middle" fill="#6e7681" font-size="9">Configured via LLM_GATEWAY_* env vars</text>

  <!-- Layer 3 right: mcp_client -->
  <rect x="570" y="290" width="260" height="130" rx="6" fill="#20120a" stroke="#b35900" stroke-width="1.5"/>
  <text x="700" y="316" text-anchor="middle" fill="#f0883e" font-size="12" font-weight="700">mcp_client.py</text>
  <text x="700" y="333" text-anchor="middle" fill="#7d8590" font-size="10">MemClaw REST client · MCP tool schemas</text>
  <line x1="590" y1="340" x2="810" y2="340" stroke="#30363d" stroke-width="1"/>
  <text x="590" y="356" fill="#8b949e" font-size="10">· memclaw_write  -&gt; POST /api/v1/memories</text>
  <text x="590" y="371" fill="#8b949e" font-size="10">· memclaw_recall -&gt; POST /api/v1/recall</text>
  <text x="590" y="386" fill="#8b949e" font-size="10">· memclaw_list   -&gt; GET  /api/v1/memories</text>
  <text x="590" y="401" fill="#8b949e" font-size="10">· memclaw_stats  -&gt; GET  /api/v1/stats</text>
  <text x="700" y="415" text-anchor="middle" fill="#6e7681" font-size="9">Auth: X-API-Key · Namespace: fleet_id + tenant_id</text>

  <!-- Arrow: mcp_client to MemClaw -->
  <line x1="700" y1="420" x2="700" y2="448" stroke="#f0883e" stroke-width="1.5" marker-end="url(#arrDownOr)"/>
  <text x="714" y="438" fill="#f0883e" font-size="10">HTTPS REST</text>

  <!-- Layer 4: MemClaw -->
  <rect x="240" y="450" width="380" height="66" rx="6" fill="#1c3d6e" stroke="#2f6dba" stroke-width="1.5"/>
  <text x="430" y="474" text-anchor="middle" fill="#79b8ff" font-size="13" font-weight="700">MemClaw Platform - memclaw.net</text>
  <text x="430" y="491" text-anchor="middle" fill="#7d8590" font-size="11">Hybrid recall: vector + keyword + knowledge graph</text>
  <text x="430" y="507" text-anchor="middle" fill="#6e7681" font-size="10">Row-level security · Audit trail · PII detection · Prism dashboard</text>

  <!-- Dashed connector: LLM to MemClaw -->
  <line x1="160" y1="420" x2="238" y2="468" stroke="#3b1f6b" stroke-width="1.5" stroke-dasharray="4,3"/>
</svg>
