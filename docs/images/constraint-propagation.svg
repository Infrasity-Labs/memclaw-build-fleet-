<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 440" font-family="'Inter', 'Segoe UI', system-ui, sans-serif">

  <defs>
    <marker id="arrBlue" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#818cf8"/>
    </marker>
    <marker id="arrGreen" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#3fb950"/>
    </marker>
    <marker id="arrOrange" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#f0883e"/>
    </marker>
    <marker id="arrPurple" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#bc8cff"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="860" height="440" fill="#0d1117" rx="10"/>
  <rect width="860" height="440" fill="none" stroke="#30363d" stroke-width="1.5" rx="10"/>

  <!-- Title -->
  <text x="430" y="34" text-anchor="middle" fill="#f0f6fc" font-size="17" font-weight="700">Constraint Propagation via Shared Memory</text>
  <text x="430" y="54" text-anchor="middle" fill="#7d8590" font-size="11">Downstream agents are automatically constrained by upstream decisions - no hard-coded coordination</text>

  <!-- MemClaw memory bar -->
  <rect x="290" y="180" width="280" height="80" rx="6" fill="#1c3d6e" stroke="#2f6dba" stroke-width="1.5"/>
  <text x="430" y="203" text-anchor="middle" fill="#79b8ff" font-size="12" font-weight="700">MemClaw Fleet Memory</text>
  <text x="430" y="220" text-anchor="middle" fill="#7d8590" font-size="10">Stored rule (written by Performance Agent):</text>
  <rect x="308" y="228" width="244" height="22" rx="4" fill="#0e2547" stroke="#2f6dba" stroke-width="1"/>
  <text x="430" y="243" text-anchor="middle" fill="#79b8ff" font-size="10" font-weight="600">"Bundle &lt; 50 KB · zero external JavaScript"</text>
  <text x="430" y="253" text-anchor="middle" fill="#6e7681" font-size="9">rule · importance 0.90 · agent: performance-agent</text>

  <!-- Performance Agent - solid green card -->
  <rect x="30" y="72" width="230" height="106" rx="6" fill="#0d2b1a" stroke="#238636" stroke-width="1.5"/>
  <rect x="30" y="72" width="230" height="32" rx="6" fill="#145734"/>
  <rect x="30" y="92" width="230" height="12" fill="#145734"/>
  <text x="145" y="92" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="600">Performance Agent</text>
  <text x="145" y="116" text-anchor="middle" fill="#8b949e" font-size="10">Audits against Core Web Vitals:</text>
  <text x="145" y="131" text-anchor="middle" fill="#8b949e" font-size="10">LCP &lt; 2.5s · CLS &lt; 0.1 · INP &lt; 200ms</text>
  <text x="145" y="149" text-anchor="middle" fill="#3fb950" font-size="11" font-weight="600">Writes rule to fleet memory</text>
  <text x="145" y="165" text-anchor="middle" fill="#e6edf3" font-size="10">"zero external JS" constraint</text>

  <!-- SEO Agent - solid purple card -->
  <rect x="600" y="72" width="230" height="106" rx="6" fill="#1e0d40" stroke="#6e40c9" stroke-width="1.5"/>
  <rect x="600" y="72" width="230" height="32" rx="6" fill="#3b1f6b"/>
  <rect x="600" y="92" width="230" height="12" fill="#3b1f6b"/>
  <text x="715" y="92" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="600">SEO Agent</text>
  <text x="715" y="116" text-anchor="middle" fill="#8b949e" font-size="10">Recalls all fleet memories first, reads:</text>
  <text x="715" y="131" text-anchor="middle" fill="#818cf8" font-size="10">"zero external JS" rule</text>
  <text x="715" y="149" text-anchor="middle" fill="#bc8cff" font-size="11" font-weight="600">Decides: inline JSON-LD only</text>
  <text x="715" y="165" text-anchor="middle" fill="#6e7681" font-size="10">No external schema library loaded</text>

  <!-- Code Review Agent - solid amber card -->
  <rect x="290" y="308" width="280" height="106" rx="6" fill="#20120a" stroke="#b35900" stroke-width="1.5"/>
  <rect x="290" y="308" width="280" height="32" rx="6" fill="#7a3a00"/>
  <rect x="290" y="328" width="280" height="12" fill="#7a3a00"/>
  <text x="430" y="328" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="600">Code Review Agent</text>
  <text x="430" y="354" text-anchor="middle" fill="#8b949e" font-size="10">Recalls both: Performance rule + SEO decision</text>
  <text x="430" y="370" text-anchor="middle" fill="#8b949e" font-size="10">Runs contradiction check via memclaw_insights</text>
  <rect x="310" y="380" width="240" height="22" rx="4" fill="#0d2b1a" stroke="#238636" stroke-width="1"/>
  <text x="430" y="395" text-anchor="middle" fill="#3fb950" font-size="11" font-weight="700">LGTM - no contradictions found</text>
  <text x="430" y="407" text-anchor="middle" fill="#6e7681" font-size="9">Cited memory IDs from Performance + SEO agents</text>

  <!-- Arrow: Performance to MemClaw -->
  <line x1="260" y1="154" x2="308" y2="208" stroke="#3fb950" stroke-width="2" marker-end="url(#arrGreen)"/>
  <rect x="168" y="172" width="82" height="14" rx="3" fill="#0d1117"/>
  <text x="209" y="183" text-anchor="middle" fill="#3fb950" font-size="10" font-weight="600">memclaw_write</text>

  <!-- Arrow: MemClaw to SEO -->
  <line x1="572" y1="208" x2="630" y2="154" stroke="#818cf8" stroke-width="2" marker-end="url(#arrBlue)"/>
  <rect x="636" y="172" width="84" height="14" rx="3" fill="#0d1117"/>
  <text x="678" y="183" text-anchor="middle" fill="#818cf8" font-size="10" font-weight="600">memclaw_recall</text>

  <!-- Arrow: MemClaw to Code Review -->
  <line x1="430" y1="260" x2="430" y2="308" stroke="#f0883e" stroke-width="2" marker-end="url(#arrOrange)"/>
  <rect x="438" y="278" width="110" height="14" rx="3" fill="#0d1117"/>
  <text x="493" y="289" text-anchor="middle" fill="#f0883e" font-size="10" font-weight="600">recall x3 + insights</text>

  <!-- SEO to MemClaw (dashed write-back) -->
  <path d="M715,178 Q715,218 572,219" fill="none" stroke="#bc8cff" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrPurple)"/>
  <rect x="648" y="196" width="82" height="14" rx="3" fill="#0d1117"/>
  <text x="689" y="207" text-anchor="middle" fill="#bc8cff" font-size="10">memclaw_write</text>

  <!-- Callout: no hardcoded coordination -->
  <rect x="308" y="75" width="244" height="44" rx="5" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="430" y="95" text-anchor="middle" fill="#6e7681" font-size="10">No hard-coded coordination between agents.</text>
  <text x="430" y="111" text-anchor="middle" fill="#6e7681" font-size="10">Constraints flow via shared fleet memory.</text>

  <!-- Footer -->
  <text x="430" y="428" text-anchor="middle" fill="#3d444d" font-size="10">This pattern scales to any number of agents and any domain.</text>
</svg>
